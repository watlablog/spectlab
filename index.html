<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>SpectLab</title>
  </head>
  <body>
    <div id="app" class="app-shell">
      <section class="app-page">
        <header class="app-header">
          <h1 class="page-title app-title">
            <span>SpectLab</span>
            <span id="app-version" class="app-version" aria-label="application version"></span>
          </h1>
          <nav class="support-links" aria-label="Project support links">
            <span class="support-message">Requests and bug reports are welcome here.</span>
            <a href="https://github.com/watlablog/spectlab" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository">
              <svg class="support-icon" width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
                <path
                  d="M12 2C6.48 2 2 6.58 2 12.23c0 4.52 2.87 8.35 6.84 9.7.5.1.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.78.62-3.37-1.21-3.37-1.21-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.56 2.35 1.11 2.92.85.09-.66.35-1.11.63-1.36-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.71 0 0 .84-.28 2.75 1.05A9.35 9.35 0 0 1 12 6.96c.85 0 1.7.12 2.5.34 1.9-1.33 2.74-1.05 2.74-1.05.55 1.4.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.8-4.57 5.06.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.81 0 .27.18.59.69.49A10.1 10.1 0 0 0 22 12.23C22 6.58 17.52 2 12 2Z"
                />
              </svg>
              <span>GitHub: watlablog</span>
            </a>
            <a href="https://x.com/watlablog/" target="_blank" rel="noopener noreferrer" aria-label="X profile">
              <svg class="support-icon" width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
                <path d="M13.86 10.47 21.15 2h-1.73l-6.33 7.35L8.03 2H2.2l7.64 11.1L2.2 22h1.73l6.68-7.77L15.95 22h5.83l-7.92-11.53Zm-2.36 2.75-.77-1.1-6.16-8.82h2.63l4.97 7.12.77 1.1 6.48 9.28h-2.63l-5.29-7.58Z" />
              </svg>
              <span>@watlablog</span>
            </a>
          </nav>
        </header>

        <section class="panel canvas-panel">
          <div class="y-axis-area">
            <div class="graph-action-widget">
              <div class="graph-action-group">
                <button id="start-button" class="btn btn-accent graph-action-button record-toggle-button" type="button" aria-label="Start recording">
                  <span class="record-toggle-icons" aria-hidden="true">
                    <span id="record-action-icon" class="action-icon action-icon-record"></span>
                    <span id="record-stop-action-icon" class="action-icon action-icon-record-stop"></span>
                  </span>
                  <span class="action-label action-label-record">Record</span>
                  <span class="action-label action-label-stop">Stop</span>
                </button>
                <button id="clear-button" class="btn graph-action-button" type="button">
                  <span id="clear-action-icon" class="action-icon" aria-hidden="true"></span>
                  <span class="action-label">Clear</span>
                </button>
              </div>
              <div class="graph-action-group">
                <button id="save-button" class="btn graph-action-button" type="button">
                  <span id="save-action-icon" class="action-icon" aria-hidden="true"></span>
                  <span class="action-label">Save Audio</span>
                </button>
                <button id="load-audio-button" class="btn graph-action-button" type="button">
                  <span id="load-audio-action-icon" class="action-icon" aria-hidden="true"></span>
                  <span class="action-label">Load Audio</span>
                </button>
              </div>
              <input id="load-audio-input" type="file" accept=".wav,.mp3,.m4a,.aac,.flac,.ogg,.webm,audio/*" hidden />
            </div>
            <div class="chart-layout">
              <div id="freq-slider-column" class="y-range-row">
                <div id="freq-slider" class="freq-slider" aria-label="周波数レンジスライダ">
                  <div class="freq-slider-track"></div>
                  <div id="freq-slider-selection" class="freq-slider-selection"></div>
                  <button
                    id="freq-handle-max"
                    class="freq-handle"
                    type="button"
                    aria-label="周波数上限ハンドル"
                  ></button>
                  <button
                    id="freq-handle-min"
                    class="freq-handle"
                    type="button"
                    aria-label="周波数下限ハンドル"
                  ></button>
                </div>
              </div>
              <div class="plot-area">
                <div class="plot-main">
                  <canvas id="spectrogram-canvas" width="960" height="420" aria-label="スペクトログラム"></canvas>
                  <div class="time-slider-wrap">
                    <div id="time-slider" class="time-slider" aria-label="時間レンジスライダ">
                      <div class="time-slider-track"></div>
                      <div id="time-slider-selection" class="time-slider-selection"></div>
                      <button
                        id="time-handle-min"
                        class="time-handle"
                        type="button"
                        aria-label="時間下限ハンドル"
                      ></button>
                      <button
                        id="time-handle-max"
                        class="time-handle"
                        type="button"
                        aria-label="時間上限ハンドル"
                      ></button>
                    </div>
                  </div>
                </div>
                <div class="db-scale-area">
                  <div class="db-scale-row">
                    <div id="db-slider" class="db-slider" aria-label="振幅レンジスライダ">
                      <div class="db-slider-track"></div>
                      <div id="db-slider-selection" class="db-slider-selection"></div>
                      <button
                        id="db-handle-max"
                        class="db-handle"
                        type="button"
                        aria-label="振幅上限ハンドル"
                      ></button>
                      <button
                        id="db-handle-min"
                        class="db-handle"
                        type="button"
                        aria-label="振幅下限ハンドル"
                      ></button>
                    </div>
                    <div id="db-colorbar" class="db-colorbar" aria-hidden="true"></div>
                    <div class="db-legend">
                      <p class="axis-caption axis-caption-db">Level [dB]</p>
                      <div id="db-ticks" class="db-ticks"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="playback-widget">
              <button id="playback-toggle-button" class="btn playback-toggle-button" type="button" aria-label="Play visible range">
                <span class="playback-toggle-icons" aria-hidden="true">
                  <span id="playback-icon-play" class="playback-icon playback-icon-play"></span>
                  <span id="playback-icon-stop" class="playback-icon playback-icon-stop"></span>
                </span>
                <span class="playback-toggle-text playback-toggle-text-play">Play</span>
                <span class="playback-toggle-text playback-toggle-text-stop">Stop</span>
              </button>
              <div
                id="playback-progress-track"
                class="playback-progress-track"
                role="progressbar"
                aria-label="再生進捗"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="0"
              >
                <div id="playback-progress-fill" class="playback-progress-fill"></div>
              </div>
              <div id="playback-time-label" class="playback-time-label">00:00 / 00:00</div>
            </div>
            <div class="range-controls">
              <label class="range-field" for="freq-min-input">
                <span>Freq.Min</span>
                <input id="freq-min-input" type="number" step="1" inputmode="numeric" />
              </label>
              <label class="range-field" for="freq-max-input">
                <span>Freq.Max</span>
                <input id="freq-max-input" type="number" step="1" inputmode="numeric" />
              </label>
              <label class="range-field" for="db-min-input">
                <span>Amp.Min</span>
                <input id="db-min-input" type="number" step="1" inputmode="numeric" />
              </label>
              <label class="range-field" for="db-max-input">
                <span>Amp.Max</span>
                <input id="db-max-input" type="number" step="1" inputmode="numeric" />
              </label>
              <label class="range-field" for="time-min-input">
                <span>Time.Min</span>
                <input id="time-min-input" type="number" step="0.1" inputmode="decimal" />
              </label>
              <label class="range-field" for="time-max-input">
                <span>Time.Max</span>
                <input id="time-max-input" type="number" step="0.1" inputmode="decimal" />
              </label>
            </div>
            <section class="fft-profile-panel" aria-label="FFT profile panel">
              <div class="fft-profile-header">
                <p class="fft-profile-title">FFT Profile</p>
                <button id="fft-average-toggle-button" class="btn fft-average-toggle-button" type="button">
                  Average FFT
                </button>
              </div>
              <p id="fft-status-label" class="fft-status-label">single @ 10.000 s</p>
              <canvas id="fft-canvas" width="960" height="190" aria-label="FFT profile"></canvas>
            </section>
          </div>
        </section>

        <section class="panel analysis-settings-panel">
          <p id="mic-status" class="status" hidden></p>
          <div class="analysis-settings">
            <label class="analysis-field" for="frame-size-select">
              <span>Frame size</span>
              <select id="frame-size-select">
                <option value="512">512</option>
                <option value="1024">1024</option>
                <option value="2048">2048</option>
                <option value="4096">4096</option>
                <option value="8192">8192</option>
              </select>
            </label>
            <label class="analysis-field" for="overlap-input">
              <span>Overlap [%]</span>
              <input id="overlap-input" type="number" min="0" max="99" step="1" inputmode="numeric" />
            </label>
            <label class="analysis-field" for="upper-frequency-select">
              <span>Upper [Hz]</span>
              <select id="upper-frequency-select">
                <option value="5000">5000</option>
                <option value="10000">10000</option>
                <option value="20000">20000</option>
              </select>
            </label>
          </div>
        </section>

        <div class="panel account-dock">
          <div class="account-info">
            <p id="analysis-metrics" class="analysis-metrics">Actual Fs: - Hz | dt: - s | Δf: - Hz</p>
            <p class="privacy-note">
              プライバシー注記: マイク入力および読み込んだ音声はブラウザ内で処理されます。本アプリは音声データをサーバーへ送信・保存しません。音声ファイルは「Save Audio」を実行した場合のみ、お使いの端末にダウンロード保存されます。
            </p>
          </div>
        </div>
      </section>

      <p id="error-message" class="error" role="alert" hidden></p>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
